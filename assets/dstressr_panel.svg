<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="DStressR workflow panel">
  <rect width="1100" height="430" fill="#f8fafc"/>
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="60" y="70" font-size="30" font-weight="700" fill="#0f172a">DStressR workflow</text>
    <text x="60" y="105" font-size="18" fill="#475569">Growth-aware promoter-response modeling for high-throughput chemical genomics</text>
  </g>
  <g transform="translate(60 150)" font-family="Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="190" height="155" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="24" y="45" font-size="20" font-weight="700" fill="#0f172a">Input screen</text>
    <text x="24" y="78" font-size="15" fill="#334155">Luminescence</text>
    <text x="24" y="103" font-size="15" fill="#334155">Growth summaries</text>
    <text x="24" y="128" font-size="15" fill="#334155">Plate metadata</text>
    <path d="M205 78 H270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M270 78 l-12 -9 v18 z" fill="#64748b"/>

    <rect x="285" y="0" width="205" height="155" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="309" y="45" font-size="20" font-weight="700" fill="#0f172a">DStressR model</text>
    <text x="309" y="78" font-size="15" fill="#334155">Growth adjustment</text>
    <text x="309" y="103" font-size="15" fill="#334155">Technical factors</text>
    <text x="309" y="128" font-size="15" fill="#334155">Compound-wide effects</text>
    <path d="M505 78 H570" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M570 78 l-12 -9 v18 z" fill="#64748b"/>

    <rect x="585" y="0" width="205" height="155" rx="16" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
    <text x="609" y="45" font-size="20" font-weight="700" fill="#0f172a">Inference</text>
    <text x="609" y="78" font-size="15" fill="#334155">Promoter effects</text>
    <text x="609" y="103" font-size="15" fill="#334155">EB variances</text>
    <text x="609" y="128" font-size="15" fill="#334155">Empirical p-values</text>
    <path d="M805 78 H870" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M870 78 l-12 -9 v18 z" fill="#64748b"/>

    <rect x="885" y="0" width="155" height="155" rx="16" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="909" y="45" font-size="20" font-weight="700" fill="#0f172a">Outputs</text>
    <text x="909" y="78" font-size="15" fill="#334155">Hits</text>
    <text x="909" y="103" font-size="15" fill="#334155">Volcano plots</text>
    <text x="909" y="128" font-size="15" fill="#334155">Heatmaps</text>
  </g>
  <g transform="translate(60 350)" font-family="Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="460" height="42" rx="10" fill="#0f172a"/>
    <text x="20" y="27" font-size="16" fill="#e2e8f0">Companion package to DGrowthR</text>
    <rect x="486" y="0" width="240" height="42" rx="10" fill="#e0f2fe"/>
    <text x="506" y="27" font-size="16" fill="#075985">DMSO-relative effects</text>
    <rect x="748" y="0" width="292" height="42" rx="10" fill="#dcfce7"/>
    <text x="768" y="27" font-size="16" fill="#166534">Promoter-specific stress responses</text>
  </g>
</svg>
